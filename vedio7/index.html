<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms-Lets learn it</title>
</head>
<body>
    <h1> Form to apply for the web development course -TA </h1>
    <form action="post">

        <label for="username">Enter your name or username</label>
        <input type="text" id="username" name="username" placeholder="enter your username" autofocus>
       
        <div>
        <label for="male">MALE</label>
        <input type="radio" id="male" name="gender" value="male">
    </div>
    <div>
        <label for="female">FEMALE</label>
        <input type="radio" id="female" name="gender" value="female">
</div>
        <input type="checkbox" id="subscribe" value="yes">
        <label for="subscribe"> Subscribe to newspaper</label>

        <label for="comment">enter the comment</label>
        <br>
        <textarea name="comment" id="comment" cols="50" rows="4">Put the comment here.... and it will be very helpful thank you for visting the page 
        </textarea>
    

    <div>
        <label for="fruits">Select the fruits as per user requirement:</label>
        <select name="fruits">
            <option value="mango">Mango</option>
            <option value="apple">Apple</option>
            <option value="banana">Banana</option>
            <option value="cherry">Cherry</option>
            <option value="organe">Orange</option>
        </select>
    </div>
    </form>
</body>
</html>
